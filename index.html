<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmosphere - Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">
                <i class="fas fa-cloud"></i> Atmosphere
            </div>
            <p class="tagline">Real-time Weather Insights</p>
        </header>
    
        <!-- From Uiverse.io by zanina-yassine --> 
        <div class="animation">
        <div class="cloud front">
         <span class="left-front"></span>
         <span class="right-front"></span>
        </div>
        <span class="sun sunshine"></span>
        <span class="sun"></span>
        <div class="cloud back">
         <span class="left-back"></span>
         <span class="right-back"></span>
        </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput" 
                    placeholder="Search for a city..."
                    autocomplete="off"
                >
                <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
            </div>
        </div>

        <!-- Main Content -->
        <div id="weatherContent" class="hidden">
            <!-- Weather Display -->
            <div class="weather-container">
                <div class="weather-card main-weather">
                    <div class="weather-card-content">
                        <div class="location-name" id="locationName">--</div>
                        <div class="location-time" id="locationTime">--</div>

                        <div class="current-weather">
                            <div class="temperature-section">
                                <div class="weather-icon" id="weatherIcon">☀️</div>
                                <div class="temperature-display">
                                    <div class="temperature" id="temperature">--°</div>
                                    <div class="condition" id="condition">--</div>
                                    <div class="feel-like" id="feelsLike">Feels like --°</div>
                                </div>
                            </div>
                        </div>

                        <div class="weather-details" id="weatherDetails">
                            <!-- Details will be populated here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3-Day Forecast -->
            <div class="forecast-section">
                <h2 class="section-title">3-Day Forecast</h2>
                <div class="forecast-grid" id="forecastGrid">
                    <!-- Forecast cards will be populated here -->
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="hidden">
            <div class="loading">
                <div class="spinner"></div>
                <p>Fetching weather data...</p>
            </div>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
